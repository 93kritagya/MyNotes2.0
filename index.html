<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>My Notes</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f7f6f3;--bg3:#f0efe9;
  --t1:#1a1a18;--t2:#5f5e5a;--t3:#9a9990;
  --bl:rgba(0,0,0,0.08);--bm:rgba(0,0,0,0.14);
  --ac:#534AB7;--acl:#EEEDFE;--acm:#AFA9EC;
  --gr:#1a7f4b;--rm:8px;--rl:12px;
  --font:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;
  --fs:14px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--bg2:#242422;--bg3:#2c2c2a;
  --t1:#f0efe9;--t2:#a8a79f;--t3:#6a6960;
  --bl:rgba(255,255,255,0.07);--bm:rgba(255,255,255,0.12);
  --ac:#7F77DD;--acl:#26215C;--acm:#3C3489;--gr:#4ade80;
}}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg3);color:var(--t1);display:flex;flex-direction:column;height:100vh}

/* topbar */
#topbar{display:flex;align-items:center;gap:5px;padding:5px 10px;background:var(--bg2);border-bottom:0.5px solid var(--bm);flex-shrink:0;overflow-x:auto}
#fs{font-size:11px;color:var(--t3);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#ss{font-size:11px;padding:2px 7px;border-radius:99px;background:var(--bg);border:0.5px solid var(--bm);color:var(--t3);white-space:nowrap;flex-shrink:0}
#ss.syn{color:var(--ac)}#ss.ok{color:var(--gr)}#ss.err{color:#c00}
.btn{font-size:11px;padding:4px 9px;border-radius:var(--rm);border:0.5px solid var(--bm);background:var(--bg);color:var(--t2);cursor:pointer;font-family:var(--font);white-space:nowrap;flex-shrink:0;transition:all .15s}
.btn:hover{background:var(--bg3);color:var(--t1)}
.btn.ac{background:var(--ac);border-color:var(--ac);color:#EEEDFE}
.btn.gr{background:var(--gr);border-color:var(--gr);color:#fff}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.pinned{background:#fef3c7;border-color:#f59e0b;color:#92400e}
input[type=file]{display:none}

/* layout */
#app{display:flex;flex:1;overflow:hidden}

/* sidebar */
#sb{width:255px;min-width:255px;border-right:0.5px solid var(--bl);display:flex;flex-direction:column;background:var(--bg2);overflow:hidden}
#sbh{padding:10px 10px 5px;display:flex;align-items:center;gap:5px;flex-shrink:0}
#sbh h1{font-size:14px;font-weight:600;flex:1}
#fswrap{padding:0 10px 5px;display:flex;align-items:center;gap:5px;flex-shrink:0}
#fswrap label{font-size:10px;color:var(--t3);white-space:nowrap}
#fss{flex:1;accent-color:var(--ac)}
#fsv{font-size:10px;color:var(--t3);min-width:30px}
#swrap{padding:0 8px 5px;flex-shrink:0}
#srch{width:100%;padding:5px 9px;font-size:12px;border:0.5px solid var(--bm);border-radius:var(--rm);background:var(--bg);color:var(--t1);outline:none;font-family:var(--font)}
#srch:focus{border-color:var(--ac)}
#srch::placeholder{color:var(--t3)}
#fnav{padding:0 8px 4px;flex-shrink:0}
#fnavi{display:flex;flex-wrap:wrap;gap:3px}
.fbtn{font-size:10px;padding:2px 8px;border-radius:99px;border:0.5px solid var(--bm);background:transparent;color:var(--t2);cursor:pointer;font-family:var(--font);transition:all .12s}
.fbtn:hover{background:var(--bg)}
.fbtn.active{background:var(--ac);border-color:var(--ac);color:#EEEDFE}
#taglist{padding:0 8px 4px;display:flex;flex-wrap:wrap;gap:3px;flex-shrink:0}
.tbtn{font-size:10px;padding:2px 7px;border-radius:99px;border:0.5px solid var(--bm);background:transparent;color:var(--t2);cursor:pointer;font-family:var(--font);transition:all .12s}
.tbtn:hover{background:var(--bg)}
.tbtn.active{background:var(--ac);border-color:var(--ac);color:#EEEDFE}
#nlist{flex:1;overflow-y:auto;padding:3px 5px}
#nlist::-webkit-scrollbar{width:3px}
#nlist::-webkit-scrollbar-thumb{background:var(--bm);border-radius:3px}
.ni{padding:7px 9px;border-radius:var(--rm);cursor:pointer;margin-bottom:2px;border:0.5px solid transparent;transition:background .1s}
.ni:hover{background:var(--bg)}
.ni.act{background:var(--bg);border-color:var(--bm)}
.nicover{width:100%;height:4px;border-radius:3px 3px 0 0;margin-bottom:4px}
.nitop{display:flex;align-items:center;gap:4px}
.nititle{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.niprev{font-size:10px;color:var(--t3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nimeta{display:flex;gap:4px;align-items:center;margin-top:2px;flex-wrap:wrap}
.ntag{font-size:10px;padding:1px 5px;border-radius:99px}
.ndate{font-size:10px;color:var(--t3)}
.nfolder{font-size:10px;color:var(--t3)}
.nonotes{padding:14px;text-align:center;font-size:11px;color:var(--t3)}
#bact{padding:6px;display:flex;flex-direction:column;gap:4px;flex-shrink:0}
#nbtn,#itbtn{padding:6px;font-size:11px;border-radius:var(--rm);border:0.5px dashed var(--bm);background:transparent;color:var(--t2);cursor:pointer;transition:all .15s;text-align:center;width:100%;font-family:var(--font)}
#nbtn:hover{background:var(--bg);color:var(--t1)}
#itbtn{border-color:var(--acm);color:var(--ac)}
#itbtn:hover{background:var(--acl)}

/* editor */
#ed{flex:1;display:flex;flex-direction:column;overflow:hidden}
#ecover{height:0;flex-shrink:0;transition:height .2s,background .2s}
#etb{padding:6px 12px;border-bottom:0.5px solid var(--bl);display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex-shrink:0;background:var(--bg)}
#tinput{flex:1;font-size:15px;font-weight:600;border:none;outline:none;background:transparent;color:var(--t1);font-family:var(--font)}
#tinput::placeholder{color:var(--t3);font-weight:400}
#si{font-size:10px;color:var(--t3);min-width:55px}

/* meta row */
#mrow{padding:4px 10px;border-bottom:0.5px solid var(--bl);display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex-shrink:0;background:var(--bg)}
#mrow label{font-size:10px;color:var(--t3)}
#cpick{display:flex;gap:3px;align-items:center}
.csw{width:15px;height:15px;border-radius:50%;cursor:pointer;border:1.5px solid transparent;transition:transform .1s;flex-shrink:0}
.csw:hover{transform:scale(1.25)}
.csw.sel{border-color:var(--t1)}
.csw.cn{background:transparent!important;border:1.5px dashed var(--bm)}
#eimoji{width:38px;padding:2px 3px;font-size:13px;border:0.5px solid var(--bm);border-radius:var(--rm);background:var(--bg2);color:var(--t1);outline:none;font-family:var(--font);text-align:center}
#efsел,#etagsel{font-size:11px;padding:3px 6px;border:0.5px solid var(--bm);border-radius:var(--rm);background:var(--bg2);color:var(--t1);outline:none;cursor:pointer;font-family:var(--font)}

/* md toolbar */
#mdtb{padding:4px 10px;border-bottom:0.5px solid var(--bl);background:var(--bg2);display:flex;gap:2px;align-items:center;flex-wrap:wrap;flex-shrink:0}
.fb{font-size:11px;padding:2px 6px;border-radius:5px;border:0.5px solid var(--bm);background:var(--bg);color:var(--t2);cursor:pointer;font-family:var(--font);font-weight:500;transition:all .1s}
.fb:hover{background:var(--acl);color:var(--ac)}
.fsep{width:0.5px;height:13px;background:var(--bm);margin:0 2px;flex-shrink:0}

/* tabs */
#tabs{padding:3px 10px 0;background:var(--bg);display:flex;flex-shrink:0}
.tab{font-size:11px;padding:4px 11px;border:none;background:transparent;color:var(--t3);cursor:pointer;font-family:var(--font);border-bottom:2px solid transparent;transition:all .12s}
.tab.act{color:var(--ac);border-bottom-color:var(--ac)}

/* body */
#econtent{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
#binput{flex:1;padding:16px 22px;font-size:var(--fs);line-height:1.85;border:none;outline:none;resize:none;background:transparent;color:var(--t1);font-family:var(--font)}
#binput::placeholder{color:var(--t3)}
#prev{flex:1;overflow-y:auto;padding:16px 22px;display:none;font-size:var(--fs)}
#prev.vis{display:block}
#prev h1{font-size:22px;font-weight:700;margin:0 0 10px}
#prev h2{font-size:17px;font-weight:600;margin:12px 0 6px}
#prev h3{font-size:14px;font-weight:600;margin:10px 0 5px}
#prev p{margin:0 0 8px;line-height:1.8}
#prev ul,#prev ol{margin:0 0 8px 18px}
#prev li{margin-bottom:2px;line-height:1.7}
#prev code{font-family:monospace;background:var(--bg3);padding:1px 4px;border-radius:4px;font-size:12px}
#prev pre{background:var(--bg3);padding:10px;border-radius:8px;overflow-x:auto;margin:0 0 8px}
#prev pre code{background:none;padding:0}
#prev blockquote{border-left:3px solid var(--acm);padding-left:10px;color:var(--t2);margin:0 0 8px}
#prev strong{font-weight:600}#prev em{font-style:italic}
#prev s{text-decoration:line-through}
#prev hr{border:none;border-top:0.5px solid var(--bm);margin:12px 0}
#prev a{color:var(--ac)}
#prev table{border-collapse:collapse;width:100%;margin:0 0 8px;font-size:12px}
#prev th,#prev td{border:0.5px solid var(--bm);padding:5px 9px}
#prev th{background:var(--bg2);font-weight:600}
#empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--t3);gap:8px;user-select:none}
#empty svg{opacity:.2}
#empty p{font-size:13px}
#empty small{font-size:11px}

/* folder modal */
#fmwrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:300;align-items:center;justify-content:center}
#fmwrap.open{display:flex}
#fmodal{background:var(--bg);border-radius:var(--rl);border:0.5px solid var(--bm);padding:20px 22px;width:320px;max-width:95vw;display:flex;flex-direction:column;gap:10px}
#fmodal h2{font-size:14px;font-weight:600}
.mi{width:100%;padding:7px 9px;font-size:13px;border:0.5px solid var(--bm);border-radius:var(--rm);background:var(--bg2);color:var(--t1);outline:none;font-family:var(--font)}
.mi:focus{border-color:var(--ac)}
#flist{display:flex;flex-direction:column;gap:3px;max-height:150px;overflow-y:auto}
.fli{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:var(--rm);background:var(--bg2);font-size:12px}
.fli span{flex:1}
.fdel{font-size:11px;color:#c00;background:none;border:none;cursor:pointer;padding:2px 5px}

/* gh modal */
#ghmwrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:400;align-items:center;justify-content:center}
#ghmwrap.open{display:flex}
#ghmodal{background:var(--bg);border-radius:var(--rl);border:0.5px solid var(--bm);padding:20px 22px;width:400px;max-width:95vw;display:flex;flex-direction:column;gap:10px}
#ghmodal h2{font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px}
#ghmodal label{font-size:11px;color:var(--t2);display:block;margin-bottom:3px}
.ghr{display:flex;gap:8px}
.ghr>div{flex:1}
.ghn{font-size:10px;color:var(--t3);background:var(--bg2);padding:7px 9px;border-radius:var(--rm);line-height:1.6}
.ghn a{color:var(--ac);text-decoration:none}
#ghcs{font-size:11px;min-height:14px}
#ghcs.ok{color:var(--gr)}#ghcs.err{color:#c00}
.row{display:flex;gap:6px;justify-content:flex-end}

/* drop overlay */
#dov{display:none;position:fixed;inset:0;background:rgba(83,74,183,.08);border:2px dashed var(--ac);z-index:50;align-items:center;justify-content:center;flex-direction:column;gap:8px;pointer-events:none}
#dov.vis{display:flex}
#dov p{font-size:14px;font-weight:500;color:var(--ac)}

/* toast + bar */
#toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--ac);color:#EEEDFE;font-size:12px;padding:6px 14px;border-radius:99px;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;z-index:600;font-family:var(--font)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#sbar{position:fixed;bottom:0;left:0;right:0;height:2px;z-index:600}
#sbarf{height:100%;background:var(--ac);width:0%;transition:width .1s linear;opacity:0}
#sbarf.act{opacity:1}
  @media (max-width: 600px) {

  #app {
    flex-direction: column;
    position: relative;
  }

  #sb {
    position: absolute;
    inset: 0;
    width: 100% !important;
    transform: translateX(0);
    transition: 0.25s ease;
    z-index: 10;
  }

  #sb.hidden-mobile {
    transform: translateX(-100%);
    pointer-events: none;
  }

  #ed {
    position: absolute;
    inset: 0;
    width: 100%;
    transform: translateX(100%);
    transition: 0.25s ease;
  }

  #ed.visible-mobile {
    transform: translateX(0);
  }

  #mobile-tabs {
    display: flex;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 52px;
    background: var(--bg2);
    border-top: 0.5px solid var(--bm);
    z-index: 100;
  }

  .mob-tab {
    flex: 1;
    font-size: 11px;
    border: none;
    background: transparent;
    color: var(--t3);
  }

  .mob-tab.active {
    color: var(--ac);
  }

  body {
    padding-bottom: 52px;
  }

  #toast {
    bottom: 64px;
  }
}

/* hide tabs on desktop */
#mobile-tabs {
  display: none;
}
</style>
</head>
<body>

<div id="topbar">
  <span id="fs">💾 Browser memory</span>
  <span id="ss">⏸ No sync</span>
  <button class="btn" id="ldbtn">📂 Load</button>
  <button class="btn ac" id="svbtn">💾 Save JSON</button>
  <button class="btn gr" id="pushbtn" disabled>⬆ Push</button>
  <button class="btn" id="pullbtn" disabled>⬇ Pull</button>
  <button class="btn" id="ghsbtn">⚙ GitHub</button>
  <input type="file" id="ldinput" accept=".json"/>
</div>

<div id="app">
  <div id="dov"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:#534AB7"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg><p id="dovlbl">Drop to import</p></div>

  <!-- Sidebar -->
  <div id="sb">
    <div id="sbh">
      <h1>My Notes</h1>
      <button class="btn" id="fmbtn" title="Manage folders">📁</button>
    </div>
    <div id="fswrap">
      <label>Font</label>
      <input type="range" id="fss" min="11" max="22" value="14"/>
      <span id="fsv">14px</span>
    </div>
    <div id="swrap"><input id="srch" type="text" placeholder="Search notes…"/></div>
    <div id="fnav"><div id="fnavi"></div></div>
    <div id="taglist"></div>
    <div id="nlist"></div>
    <div id="bact">
      <button id="nbtn">+ New note</button>
      <button id="itbtn">↑ Import text file</button>
      <input type="file" id="itinput" multiple accept=".txt,.md,.csv,.log,.json,.py,.js,.ts,.css,.yml,.yaml,.sh,.java,.c,.cpp,.rs,.go,.rb,.php"/>
    </div>
    <div style="padding:4px 8px;flex-shrink:0"><p id="nc" style="font-size:10px;color:var(--t3)"></p></div>
  </div>

  <!-- Editor -->
  <div id="ed">
    <div id="ecover"></div>

    <!-- Title row -->
    <div id="etb" style="display:none">
      <input id="tinput" type="text" placeholder="Note title…"/>
      <span id="si"></span>
      <button class="btn" id="pinbtn">📌 Pin</button>
      <button class="btn" id="delbtn">Delete</button>
    </div>

    <!-- Meta row: color, emoji, folder, tag -->
    <div id="mrow" style="display:none">
      <label>Color:</label>
      <div id="cpick"></div>
      <label style="margin-left:5px">Icon:</label>
      <input id="eimoji" type="text" maxlength="2" placeholder="📝"/>
      <label style="margin-left:5px">Folder:</label>
      <select id="efsel"><option value="">None</option></select>
      <label style="margin-left:5px">Tag:</label>
      <select id="etagsel">
        <option value="">No tag</option>
        <option value="work">Work</option>
        <option value="personal">Personal</option>
        <option value="ideas">Ideas</option>
        <option value="todo">Todo</option>
      </select>
    </div>

    <!-- Markdown toolbar -->
    <div id="mdtb" style="display:none">
      <button class="fb" data-f="bold"><b>B</b></button>
      <button class="fb" data-f="italic"><i>I</i></button>
      <button class="fb" data-f="strike"><s>S</s></button>
      <div class="fsep"></div>
      <button class="fb" data-f="h1">H1</button>
      <button class="fb" data-f="h2">H2</button>
      <button class="fb" data-f="h3">H3</button>
      <div class="fsep"></div>
      <button class="fb" data-f="ul">• List</button>
      <button class="fb" data-f="ol">1. List</button>
      <button class="fb" data-f="task">☑ Task</button>
      <button class="fb" data-f="quote">❝</button>
      <button class="fb" data-f="code">` Code</button>
      <button class="fb" data-f="block">⬜ Block</button>
      <button class="fb" data-f="hr">—</button>
      <button class="fb" data-f="link">🔗</button>
      <button class="fb" data-f="table">⊞</button>
    </div>

    <!-- Tabs -->
    <div id="tabs" style="display:none">
      <button class="tab act" id="twbtn">✏️ Write</button>
      <button class="tab" id="tpbtn">👁 Preview</button>
    </div>

    <!-- Content -->
    <div id="econtent">
      <div id="empty">
        <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.1"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        <p>Select a note or create a new one</p>
        <small>Markdown · Folders · Pin · Colors · Font size · GitHub sync</small>
      </div>
      <textarea id="binput" placeholder="Start writing… (Markdown supported)" style="display:none"></textarea>
      <div id="prev"></div>
    </div>
  </div>
</div>

<!-- Folder modal -->
<div id="fmwrap">
  <div id="fmodal">
    <h2>📁 Manage Folders</h2>
    <div style="display:flex;gap:6px">
      <input class="mi" id="nfinput" type="text" placeholder="New folder name…" style="flex:1"/>
      <button class="btn ac" id="cfbtn">Add</button>
    </div>
    <div id="flist"></div>
    <div class="row"><button class="btn" id="fmclose">Close</button></div>
  </div>
</div>

<!-- GitHub modal -->
<div id="ghmwrap">
  <div id="ghmodal">
    <h2>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
      GitHub Sync
    </h2>
    <div><label>Personal Access Token</label><input class="mi" id="ghtok" type="password" placeholder="ghp_…"/></div>
    <div class="ghr">
      <div><label>Username</label><input class="mi" id="ghuser" type="text" placeholder="username"/></div>
      <div><label>Repository</label><input class="mi" id="ghrepo" type="text" placeholder="my-notes"/></div>
    </div>
    <div><label>File path (.json)</label><input class="mi" id="ghpath" type="text" placeholder="notes-data.json"/></div>
    <div class="ghn">🔑 <a href="https://github.com/settings/tokens/new" target="_blank">Get token here</a> → No expiry → tick <strong>repo</strong> → Generate → copy. Auto-pulls on open, auto-pushes every 5s.</div>
    <div id="ghcs"></div>
    <div class="row">
      <button class="btn" id="ghtestbtn">Test</button>
      <button class="btn" id="ghcancelbtn">Cancel</button>

<script>
'use strict';
/* ── Keys ── */
const K_NOTES='notes-v5', K_GH='notes-gh-v2', K_FOLD='notes-fold-v1', K_FONT='notes-font';
const AUTO=5000;
const COLORS=[
  {n:'none',h:''},
  {n:'red',h:'#ef4444'},{n:'orange',h:'#f97316'},{n:'amber',h:'#f59e0b'},
  {n:'green',h:'#22c55e'},{n:'teal',h:'#14b8a6'},{n:'blue',h:'#3b82f6'},
  {n:'purple',h:'#8b5cf6'},{n:'pink',h:'#ec4899'},{n:'gray',h:'#6b7280'},
];
const TC={work:{bg:'#dbeafe',c:'#1e40af'},personal:{bg:'#d1fae5',c:'#065f46'},ideas:{bg:'#ede9fe',c:'#4c1d95'},todo:{bg:'#fef3c7',c:'#78350f'}};

/* ── State ── */
let notes=[], folders=[], activeId=null, fTag='', fFolder='', dirty=false, loadedFrom=null;
let ghCfg=JSON.parse(localStorage.getItem(K_GH)||'null')||{token:'',user:'',repo:'',path:'notes-data.json'};
let asTimer=null, sbTimer=null, sbProg=0, syncing=false, isPrev=false, lsTimer=null;

/* ── Helpers ── */
const $=id=>document.getElementById(id);
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmt=ts=>new Date(ts).toLocaleDateString(undefined,{day:'numeric',month:'short'});
const ghOk=()=>!!(ghCfg.token&&ghCfg.user&&ghCfg.repo&&ghCfg.path);
const persist=()=>{localStorage.setItem(K_NOTES,JSON.stringify(notes));dirty=true;updateStatus();};
const saveFold=()=>localStorage.setItem(K_FOLD,JSON.stringify(folders));

function toast(msg,d=2800){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d);}

function updateStatus(){
  $('fs').textContent=dirty?`⚠️ Unsaved${loadedFrom?' · '+loadedFrom:''}`:loadedFrom?`✅ ${loadedFrom}`:'💾 Browser memory';
  $('pushbtn').disabled=!ghOk();
  $('pullbtn').disabled=!ghOk();
}
function setSS(cls,msg){const e=$('ss');e.className=cls;e.textContent=msg;}
function ssIdle(){setSS(ghOk()?'ok':'','🔄 Auto-sync');}

/* ── Font size ── */
const initFont=parseInt(localStorage.getItem(K_FONT)||'14');
document.documentElement.style.setProperty('--fs',initFont+'px');
$('fss').value=initFont; $('fsv').textContent=initFont+'px';
$('fss').addEventListener('input',e=>{
  const v=e.target.value;
  document.documentElement.style.setProperty('--fs',v+'px');
  $('fsv').textContent=v+'px';
  localStorage.setItem(K_FONT,v);
});

/* ── Markdown parser ── */
function md(raw){
  let h=esc(raw);
  h=h.replace(/```([\s\S]*?)```/g,(_,c)=>`<pre><code>${c.trim()}</code></pre>`);
  h=h.replace(/`([^`]+)`/g,(_,c)=>`<code>${c}</code>`);
  h=h.replace(/^### (.+)$/gm,(_,t)=>`<h3>${t}</h3>`);
  h=h.replace(/^## (.+)$/gm,(_,t)=>`<h2>${t}</h2>`);
  h=h.replace(/^# (.+)$/gm,(_,t)=>`<h1>${t}</h1>`);
  h=h.replace(/^&gt; (.+)$/gm,(_,t)=>`<blockquote>${t}</blockquote>`);
  h=h.replace(/^---$/gm,'<hr/>');
  h=h.replace(/\*\*(.+?)\*\*/gs,(_,t)=>`<strong>${t}</strong>`);
  h=h.replace(/\*(.+?)\*/gs,(_,t)=>`<em>${t}</em>`);
  h=h.replace(/~~(.+?)~~/gs,(_,t)=>`<s>${t}</s>`);
  h=h.replace(/\[([^\]]+)\]\(([^)]+)\)/g,(_,t,u)=>`<a href="${u}" target="_blank">${t}</a>`);
  h=h.replace(/^- \[x\] (.+)$/gm,(_,t)=>`<li>✅ ${t}</li>`);
  h=h.replace(/^- \[ \] (.+)$/gm,(_,t)=>`<li>⬜ ${t}</li>`);
  h=h.replace(/(^- .+(\n|$))+/gm,blk=>'<ul>'+blk.trim().split('\n').map(l=>`<li>${l.replace(/^- /,'')}</li>`).join('')+'</ul>');
  h=h.replace(/(^\d+\. .+(\n|$))+/gm,blk=>'<ol>'+blk.trim().split('\n').map(l=>`<li>${l.replace(/^\d+\. /,'')}</li>`).join('')+'</ol>');
  h=h.replace(/(^\|.+\|(\n|$))+/gm,blk=>{
    const rows=blk.trim().split('\n').filter(r=>!/^\|[-|: ]+\|$/.test(r));
    if(!rows.length)return blk;
    const hd=rows[0].split('|').slice(1,-1).map(c=>`<th>${c.trim()}</th>`).join('');
    const bd=rows.slice(1).map(r=>'<tr>'+r.split('|').slice(1,-1).map(c=>`<td>${c.trim()}</td>`).join('')+'</tr>').join('');
    return `<table><thead><tr>${hd}</tr></thead><tbody>${bd}</tbody></table>`;
  });
  h=h.replace(/^(?!<[houbtsp]|<bl|<pr|<hr|<li)(.+)$/gm,'<p>$1</p>');
  return h;
}

/* ── JSON helpers ── */
function toJSON(){return JSON.stringify({v:4,exported:new Date().toISOString(),folders,notes},null,2);}
function fromJSON(txt){
  const o=JSON.parse(txt);
  if(o&&Array.isArray(o.notes)){if(Array.isArray(o.folders))folders=o.folders;return o.notes;}
  if(Array.isArray(o))return o;
  throw new Error('Invalid file format');
}

/* ── Default notes ── */
function defNotes(){
  return[
    {id:1,title:'Welcome — Features Guide',body:'# My Notes — Features\n\n## ✏️ Markdown\nWrite with **bold**, *italic*, ~~strike~~, `code`.\n\nClick **👁 Preview** to see rendered output.\n\n## 📁 Folders\nClick the **📁** button to create folders.\nAssign notes via the **Folder** dropdown.\n\n## 📌 Pin Notes\nClick **📌 Pin** to keep a note at the top.\n\n## 🎨 Note Colors\nPick a color dot to apply a color strip to your note.\n\n## 😀 Emoji Icons\nType an emoji in the **Icon** field — shows in the note list.\n\n## 🔤 Font Size\nDrag the **Font** slider in the sidebar.\n\n## 🔄 GitHub Sync\nAuto-pulls on open · auto-pushes every 5s while editing.',
     tag:'personal',folder:'',pinned:true,color:'#8b5cf6',emoji:'👋',updated:Date.now()-60000},
    {id:2,title:'Markdown Cheatsheet',body:'# Cheatsheet\n\n**bold** | *italic* | ~~strike~~ | `code`\n\n# H1 | ## H2 | ### H3\n\n- item\n- item\n\n1. one\n2. two\n\n- [x] done\n- [ ] todo\n\n> blockquote\n\n```\nconst x = 1;\n```\n\n| A | B |\n|---|---|\n| 1 | 2 |\n\n[link](https://github.com)\n\n---',
     tag:'ideas',folder:'',pinned:false,color:'#3b82f6',emoji:'📋',updated:Date.now()-120000},
    {id:3,title:'Weekend ideas',body:'- Go for a walk\n- Try that new coffee place\n- Finish the book',tag:'ideas',folder:'',pinned:false,color:'',emoji:'',updated:Date.now()-300000},
  ];
}

/* ── Boot ── */
async function boot(){
  const sf=localStorage.getItem(K_FOLD); if(sf){try{folders=JSON.parse(sf);}catch{folders=[];}}
  const sn=localStorage.getItem(K_NOTES); if(sn){try{notes=JSON.parse(sn);}catch{notes=defNotes();}}else{notes=defNotes();}
  activeId=notes[0]?.id||null;
  buildColorPicker();
  renderAll();
  updateStatus();
  ssIdle();
  if(ghOk()){
    setSS('syn','⟳ Pulling…');
    try{await ghPullCore();renderAll();updateStatus();setSS('ok','✅ Pulled');setTimeout(ssIdle,3000);}
    catch{setSS('err','❌ Pull failed');setTimeout(ssIdle,4000);}
  }
}

/* ══ COLOR PICKER ══ */
function buildColorPicker(){
  const wrap=$('cpick'); wrap.innerHTML='';
  COLORS.forEach(c=>{
    const sw=document.createElement('div');
    sw.className='csw'+(c.h===''?' cn':'');
    sw.title=c.n; sw.dataset.h=c.h;
    if(c.h)sw.style.background=c.h;
    sw.onclick=()=>{
      const n=notes.find(x=>x.id===activeId); if(!n)return;
      n.color=c.h; onEdit(false);
      wrap.querySelectorAll('.csw').forEach(s=>s.classList.remove('sel'));
      sw.classList.add('sel');
      setCover(c.h);
    };
    wrap.appendChild(sw);
  });
}
function syncColors(hex){
  document.querySelectorAll('#cpick .csw').forEach(s=>s.classList.toggle('sel',s.dataset.h===hex));
  setCover(hex);
}
function setCover(hex){
  const el=$('ecover');
  el.style.background=hex||'transparent';
  el.style.height=hex?'5px':'0';
}

/* ══ FOLDER NAV ══ */
function renderFolderNav(){
  const wrap=$('fnavi'); wrap.innerHTML='';
  // All
  const all=document.createElement('button');
  all.className='fbtn'+(fFolder===''?' active':'');
  all.textContent='📋 All';
  all.onclick=()=>{fFolder='';renderAll();};
  wrap.appendChild(all);
  // Folders
  folders.forEach(f=>{
    const b=document.createElement('button');
    b.className='fbtn'+(fFolder===f.id?' active':'');
    b.textContent=(f.icon||'📁')+' '+f.name;
    b.onclick=()=>{fFolder=f.id;renderAll();};
    wrap.appendChild(b);
  });
  // Sync folder select
  syncFolderSelect();
}
function syncFolderSelect(){
  const sel=$('efsel'); const cur=sel.value;
  sel.innerHTML='<option value="">None</option>';
  folders.forEach(f=>{const o=document.createElement('option');o.value=f.id;o.textContent=f.name;sel.appendChild(o);});
  if([...sel.options].some(o=>o.value===cur))sel.value=cur;
}

/* ══ TAG LIST ══ */
function renderTags(){
  const wrap=$('taglist'); wrap.innerHTML='';
  const used=new Set(notes.map(n=>n.tag).filter(Boolean));
  const allb=document.createElement('button');
  allb.className='tbtn'+(!fTag?' active':'');
  allb.textContent='All';
  allb.onclick=()=>{fTag='';renderAll();};
  wrap.appendChild(allb);
  ['work','personal','ideas','todo'].filter(t=>used.has(t)).forEach(t=>{
    const b=document.createElement('button');
    b.className='tbtn'+(fTag===t?' active':'');
    b.textContent=t[0].toUpperCase()+t.slice(1);
    b.onclick=()=>{fTag=fTag===t?'':t;renderAll();};
    wrap.appendChild(b);
  });
}

/* ══ NOTE LIST ══ */
function getFiltered(){
  const q=$('srch').value.toLowerCase();
  return notes.filter(n=>{
    const mf=fFolder===''||n.folder===fFolder;
    const mt=!fTag||n.tag===fTag;
    const mq=!q||n.title.toLowerCase().includes(q)||(n.body||'').toLowerCase().includes(q);
    return mf&&mt&&mq;
  }).sort((a,b)=>(b.pinned||0)-(a.pinned||0)||b.updated-a.updated);
}
function renderList(){
  const list=$('nlist'); const fil=getFiltered();
  $('nc').textContent=fil.length+' note'+(fil.length!==1?'s':'');
  if(!fil.length){list.innerHTML='<div class="nonotes">No notes found</div>';return;}
  list.innerHTML='';
  fil.forEach(n=>{
    const div=document.createElement('div');
    div.className='ni'+(n.id===activeId?' act':'');
    div.onclick=()=>{activeId=n.id;renderList();renderEditor();};
    const tc=n.tag?TC[n.tag]:null;
    const fn=folders.find(f=>f.id===n.folder)?.name||'';
    const pv=(n.body||'').replace(/[#*`>~\[\]_]/g,'').replace(/\n/g,' ').slice(0,55);
    let html='';
    if(n.color)html+=`<div class="nicover" style="background:${n.color}"></div>`;
    html+=`<div class="nitop">`;
    if(n.pinned)html+=`<span style="font-size:10px">📌</span>`;
    if(n.emoji)html+=`<span style="font-size:12px">${n.emoji}</span>`;
    html+=`<div class="nititle">${esc(n.title||'Untitled')}</div></div>`;
    html+=`<div class="niprev">${esc(pv||'No content')}</div>`;
    html+=`<div class="nimeta">`;
    if(tc)html+=`<span class="ntag" style="background:${tc.bg};color:${tc.c}">${n.tag}</span>`;
    if(fn)html+=`<span class="nfolder">📁${esc(fn)}</span>`;
    html+=`<span class="ndate">${fmt(n.updated)}</span></div>`;
    div.innerHTML=html;
    list.appendChild(div);
  });
}

/* ══ EDITOR ══ */
function renderEditor(){
  const note=notes.find(n=>n.id===activeId);
  if(!note){
    $('etb').style.display='none'; $('mrow').style.display='none';
    $('mdtb').style.display='none'; $('tabs').style.display='none';
    $('empty').style.display='flex'; $('binput').style.display='none';
    $('prev').classList.remove('vis'); setCover(''); return;
  }
  $('etb').style.display='flex'; $('mrow').style.display='flex';
  $('mdtb').style.display='flex'; $('tabs').style.display='flex';
  $('empty').style.display='none';
  $('tinput').value=note.title||'';
  $('eimoji').value=note.emoji||'';
  $('etagsel').value=note.tag||'';
  $('efsel').value=note.folder||'';
  $('si').textContent='';
  // Pin
  $('pinbtn').textContent=note.pinned?'📌 Pinned':'📌 Pin';
  $('pinbtn').classList.toggle('pinned',!!note.pinned);
  // Color
  syncColors(note.color||'');
  // Body
  if(isPrev){
    $('binput').style.display='none';
    $('prev').innerHTML=md(note.body||'');
    $('prev').classList.add('vis');
    $('tpbtn').classList.add('act'); $('twbtn').classList.remove('act');
  } else {
    $('binput').style.display='block';
    $('prev').classList.remove('vis');
    $('binput').value=note.body||'';
    $('twbtn').classList.add('act'); $('tpbtn').classList.remove('act');
  }
}

function renderAll(){renderTags();renderFolderNav();renderList();renderEditor();}

/* ══ NOTE ACTIONS ══ */
$('nbtn').onclick=()=>{
  const n={id:Date.now(),title:'',body:'',tag:'',folder:fFolder||'',pinned:false,color:'',emoji:'',updated:Date.now()};
  notes.unshift(n); activeId=n.id; persist(); renderAll();
  setTimeout(()=>$('tinput').focus(),50);
};

$('delbtn').onclick=()=>{
  if(!activeId||!confirm('Delete this note?'))return;
  notes=notes.filter(n=>n.id!==activeId);
  activeId=notes[0]?.id||null; persist(); renderAll(); scheduleAS();
};

$('pinbtn').onclick=()=>{
  const n=notes.find(x=>x.id===activeId); if(!n)return;
  n.pinned=!n.pinned;
  $('pinbtn').textContent=n.pinned?'📌 Pinned':'📌 Pin';
  $('pinbtn').classList.toggle('pinned',n.pinned);
  persist(); renderList(); scheduleAS();
  toast(n.pinned?'📌 Note pinned':'Note unpinned');
};

$('eimoji').addEventListener('input',()=>onEdit(false));
$('efsel').addEventListener('change',()=>{
  const n=notes.find(x=>x.id===activeId); if(!n)return;
  n.folder=$('efsel').value; persist(); renderList(); scheduleAS();
});
$('etagsel').addEventListener('change',()=>onEdit(false));
$('tinput').addEventListener('input',()=>onEdit(false));
$('srch').addEventListener('input',renderAll);

$('binput').addEventListener('input',()=>{
  onEdit(false);
  if(isPrev){const n=notes.find(x=>x.id===activeId);if(n)$('prev').innerHTML=md(n.body||'');}
});

function onEdit(skipAS=false){
  const n=notes.find(x=>x.id===activeId); if(!n)return;
  n.title=$('tinput').value;
  n.body=$('binput').value;
  n.tag=$('etagsel').value;
  n.emoji=$('eimoji').value;
  n.updated=Date.now();
  clearTimeout(lsTimer);
  lsTimer=setTimeout(()=>{
    persist(); renderTags(); renderList();
    $('si').textContent='💾 Saved';
    setTimeout(()=>$('si').textContent='',1200);
  },600);
  if(!skipAS)scheduleAS();
}

/* ── Tabs ── */
$('twbtn').onclick=()=>{
  isPrev=false; renderEditor();
};
$('tpbtn').onclick=()=>{
  isPrev=true; renderEditor();
};

/* ── Markdown format buttons ── */
document.querySelectorAll('.fb').forEach(b=>{
  b.addEventListener('click',()=>{
    const ta=$('binput'); const f=b.dataset.f;
    const s=ta.selectionStart, e=ta.selectionEnd;
    const sel=ta.value.substring(s,e);
    let ins='';
    switch(f){
      case 'bold':   ins=`**${sel||'bold'}**`; break;
      case 'italic': ins=`*${sel||'italic'}*`; break;
      case 'strike': ins=`~~${sel||'text'}~~`; break;
      case 'h1':     ins=`# ${sel||'Heading 1'}`; break;
      case 'h2':     ins=`## ${sel||'Heading 2'}`; break;
      case 'h3':     ins=`### ${sel||'Heading 3'}`; break;
      case 'ul':     ins=`- ${sel||'item'}`; break;
      case 'ol':     ins=`1. ${sel||'item'}`; break;
      case 'task':   ins=`- [ ] ${sel||'task'}`; break;
      case 'quote':  ins=`> ${sel||'quote'}`; break;
      case 'code':   ins=`\`${sel||'code'}\``; break;
      case 'block':  ins=`\`\`\`\n${sel||'code'}\n\`\`\``; break;
      case 'hr':     ins=`\n---\n`; break;
      case 'link':   ins=`[${sel||'text'}](https://)`; break;
      case 'table':  ins=`| Col1 | Col2 |\n|------|------|\n| A    | B    |`; break;
    }
    ta.focus(); ta.setRangeText(ins,s,e,'end'); onEdit(false);
  });
});

/* ══ FOLDER MODAL ══ */
function openFM(){renderFolderModal(); $('fmwrap').classList.add('open');}
function closeFM(){$('fmwrap').classList.remove('open');}
function renderFolderModal(){
  const list=$('flist'); list.innerHTML='';
  if(!folders.length){list.innerHTML='<div style="font-size:11px;color:var(--t3);padding:5px">No folders yet</div>';return;}
  folders.forEach(f=>{
    const div=document.createElement('div'); div.className='fli';
    div.innerHTML=`<span>${f.icon||'📁'} ${esc(f.name)}</span>`;
    const db=document.createElement('button'); db.className='fdel'; db.textContent='✕';
    db.onclick=()=>{
      folders=folders.filter(x=>x.id!==f.id);
      notes.forEach(n=>{if(n.folder===f.id)n.folder='';});
      saveFold(); persist(); renderFolderModal(); renderFolderNav(); renderList();
    };
    div.appendChild(db); list.appendChild(div);
  });
}
$('fmbtn').onclick=openFM;
$('fmclose').onclick=closeFM;
$('fmwrap').onclick=e=>{if(e.target===$('fmwrap'))closeFM();};
$('cfbtn').onclick=()=>{
  const v=$('nfinput').value.trim(); if(!v)return;
  folders.push({id:'f_'+Date.now(),name:v,icon:'📁'});
  saveFold(); $('nfinput').value='';
  renderFolderModal(); renderFolderNav();
  toast(`Folder "${v}" created`);
};
$('nfinput').addEventListener('keydown',e=>{if(e.key==='Enter')$('cfbtn').click();});

/* ══ GITHUB ══ */
function ghH(){return{'Authorization':`token ${ghCfg.token}`,'Content-Type':'application/json','Accept':'application/vnd.github+json'};}
function ghURL(){return`https://api.github.com/repos/${ghCfg.user}/${ghCfg.repo}/contents/${ghCfg.path}`;}

async function ghPushCore(){
  const content=btoa(unescape(encodeURIComponent(toJSON())));
  let sha=null;
  try{const r=await fetch(ghURL(),{headers:ghH()});if(r.ok){const d=await r.json();sha=d.sha;}}catch{}
  const body={message:`Sync ${new Date().toLocaleString()}`,content};
  if(sha)body.sha=sha;
  const res=await fetch(ghURL(),{method:'PUT',headers:ghH(),body:JSON.stringify(body)});
  if(!res.ok){const e=await res.json();throw new Error(e.message||`HTTP ${res.status}`);}
}
async function ghPullCore(){
  const res=await fetch(ghURL(),{headers:ghH()});
  if(!res.ok){const e=await res.json();throw new Error(e.message||`HTTP ${res.status}`);}
  const data=await res.json();
  const txt=decodeURIComponent(escape(atob(data.content)));
  const loaded=fromJSON(txt);
  if(!loaded.length)throw new Error('No notes found');
  notes=loaded;
  activeId=notes.find(n=>n.id===activeId)?activeId:notes[0]?.id||null;
  dirty=false; loadedFrom=`GitHub (${ghCfg.user}/${ghCfg.repo})`;
  localStorage.setItem(K_NOTES,JSON.stringify(notes));
}

async function pushNow(){
  if(syncing)return; syncing=true;
  const btn=$('pushbtn'); btn.disabled=true; btn.textContent='⬆ Pushing…';
  setSS('syn','⟳ Pushing…');
  try{await ghPushCore();dirty=false;loadedFrom=`GitHub (${ghCfg.user}/${ghCfg.repo})`;updateStatus();setSS('ok','✅ Pushed');toast(`✅ Pushed to ${ghCfg.user}/${ghCfg.repo}`);setTimeout(ssIdle,3000);}
  catch(e){setSS('err','❌ Failed');toast('❌ Push failed: '+e.message,4000);setTimeout(ssIdle,4000);}
  finally{syncing=false;btn.disabled=!ghOk();btn.textContent='⬆ Push';updateStatus();}
}
async function pullNow(){
  if(syncing)return; syncing=true;
  const btn=$('pullbtn'); btn.disabled=true; btn.textContent='⬇ Pulling…';
  setSS('syn','⟳ Pulling…');
  try{await ghPullCore();renderAll();updateStatus();setSS('ok',`✅ Pulled`);toast(`✅ Pulled ${notes.length} notes`);setTimeout(ssIdle,3000);}
  catch(e){setSS('err','❌ Failed');toast('❌ Pull failed: '+e.message,4000);setTimeout(ssIdle,4000);}
  finally{syncing=false;btn.disabled=!ghOk();btn.textContent='⬇ Pull';updateStatus();}
}
async function ghTest(){
  const tok=$('ghtok').value.trim(),usr=$('ghuser').value.trim(),rep=$('ghrepo').value.trim();
  const cs=$('ghcs');
  if(!tok||!usr||!rep){cs.className='err';cs.textContent='Fill all fields.';return;}
  cs.className='';cs.textContent='Testing…';
  try{
    const r=await fetch(`https://api.github.com/repos/${usr}/${rep}`,{headers:{'Authorization':`token ${tok}`,'Accept':'application/vnd.github+json'}});
    if(r.ok){const d=await r.json();cs.className='ok';cs.textContent=`✅ "${d.full_name}" (${d.private?'private':'public'})`;}
    else{const e=await r.json();cs.className='err';cs.textContent=`❌ ${e.message}`;}
  }catch(e){cs.className='err';cs.textContent='❌ '+e.message;}
}

$('pushbtn').onclick=pushNow;
$('pullbtn').onclick=pullNow;
$('ghsbtn').onclick=()=>{
  $('ghtok').value=ghCfg.token||'';$('ghuser').value=ghCfg.user||'';

/* ── Auto sync ── */
function scheduleAS(){
  if(!ghOk())return;
  clearTimeout(asTimer); startBar();
  setSS('syn','⟳ In 5s…');
  asTimer=setTimeout(async()=>{
    if(syncing)return; syncing=true;
    try{await ghPushCore();dirty=false;loadedFrom=`GitHub (${ghCfg.user}/${ghCfg.repo})`;updateStatus();finishBar(true);setSS('ok','✅ Auto-synced');setTimeout(ssIdle,2500);}
    catch{finishBar(false);setSS('err','❌ Sync failed');setTimeout(ssIdle,3000);}
    finally{syncing=false;}
  },AUTO);
}
function startBar(){
  sbProg=0; const f=$('sbarf');
  f.style.background='var(--ac)'; f.style.width='0%'; f.classList.add('act');
  clearInterval(sbTimer);
  sbTimer=setInterval(()=>{sbProg=Math.min(sbProg+100/(AUTO/100),95);f.style.width=sbProg+'%';},100);
}
function finishBar(ok){
  clearInterval(sbTimer); const f=$('sbarf');
  f.style.width='100%'; f.style.background=ok?'var(--gr)':'#c00';
  setTimeout(()=>{f.style.width='0%';f.classList.remove('act');f.style.background='var(--ac)';},600);
}

/* ── Local file save/load ── */
$('svbtn').onclick=()=>{
  const blob=new Blob([toJSON()],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='notes-data.json'; a.click(); URL.revokeObjectURL(a.href);
  dirty=false; loadedFrom=loadedFrom||'notes-data.json'; updateStatus();
  toast('Saved as notes-data.json');
};
$('ldbtn').onclick=()=>$('ldinput').click();
$('ldinput').onchange=e=>{if(e.target.files[0])loadFile(e.target.files[0]);e.target.value='';};
function loadFile(file){
  const r=new FileReader();
  r.onload=e=>{
    try{
      const loaded=fromJSON(e.target.result);
      if(!loaded.length)throw new Error('No notes found');
      notes=loaded; activeId=notes[0]?.id||null; loadedFrom=file.name; dirty=false;
      localStorage.setItem(K_NOTES,JSON.stringify(notes)); renderAll(); updateStatus();
      toast(`Loaded ${notes.length} notes from "${file.name}"`);
    }catch(err){alert('Could not load:\n\n'+err.message);}
  }; r.readAsText(file);
}

/* ── Import text files ── */
function fname(n){return n.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ').replace(/\b\w/g,c=>c.toUpperCase());}
function procFile(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=e=>{
      let body=e.target.result;
      if(file.name.endsWith('.json')){try{body=JSON.stringify(JSON.parse(body),null,2);}catch{}}
      res({id:Date.now()+Math.random(),title:fname(file.name),body:body.trimEnd(),tag:'',folder:fFolder||'',pinned:false,color:'',emoji:'',updated:file.lastModified||Date.now(),imported:true});
    }; r.onerror=()=>res(null); r.readAsText(file);
  });
}
async function importFiles(files){
  const imp=(await Promise.all(Array.from(files).map(procFile))).filter(Boolean);
  if(!imp.length)return;
  imp.forEach(n=>notes.unshift(n)); activeId=imp[0].id; persist(); renderAll();
  toast(imp.length===1?`"${imp[0].title}" imported`:`${imp.length} files imported`);
}
$('itbtn').onclick=()=>$('itinput').click();
$('itinput').onchange=e=>{importFiles(e.target.files);e.target.value='';};

/* ── Drag & drop ── */
const dov=$('dov'), dovl=$('dovlbl'); let dc=0;
document.addEventListener('dragenter',e=>{e.preventDefault();dc++;const fs=e.dataTransfer?.items?Array.from(e.dataTransfer.items):[];dovl.textContent=fs.some(i=>i.getAsFile?.()?.name?.endsWith('.json'))?'Drop to restore':'Drop to import';dov.classList.add('vis');});
document.addEventListener('dragleave',()=>{dc--;if(dc<=0){dc=0;dov.classList.remove('vis');}});
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{
  e.preventDefault();dc=0;dov.classList.remove('vis');
  const all=Array.from(e.dataTransfer.files);
  const jf=all.filter(f=>f.name.endsWith('.json'));
  const tf=all.filter(f=>!f.name.endsWith('.json'));
  if(jf.length)loadFile(jf[0]);
  if(tf.length)importFiles(tf);
});

/* ── Mobile tab switching (FINAL STABLE) ── */
function isMobile() { 
  return window.innerWidth <= 600; 
}

function switchMobileTab(tab) {
  if (!isMobile()) return;

  const sidebar = document.getElementById('sb');
  const editor  = document.getElementById('ed');
  const tabNotes  = document.getElementById('tab-notes');
  const tabEditor = document.getElementById('tab-editor');

  if (!sidebar || !editor) return; // safety

  if (tab === 'notes') {
    sidebar.classList.remove('hidden-mobile');
    editor.classList.remove('visible-mobile');

    tabNotes?.classList.add('active');
    tabEditor?.classList.remove('active');
  } else {
    sidebar.classList.add('hidden-mobile');
    editor.classList.add('visible-mobile');

    tabNotes?.classList.remove('active');
    tabEditor?.classList.add('active');
  }
}

window.switchMobileTab = switchMobileTab;

/* Wait until DOM ready */
document.addEventListener('DOMContentLoaded', () => {

  const nlist = document.getElementById('nlist');
  const nbtn  = document.getElementById('nbtn');

  /* Auto-switch when note clicked */
  if (nlist) {
    nlist.addEventListener('click', e => {
      if (isMobile() && e.target.closest('.ni')) {
        setTimeout(() => switchMobileTab('editor'), 50);
      }
    });
  }

  /* Auto-switch when NEW note clicked */
  if (nbtn) {
    nbtn.addEventListener('click', () => {
      if (isMobile()) setTimeout(() => switchMobileTab('editor'), 80);
    });
  }

  /* Initial mobile state */
  if (isMobile()) {
    switchMobileTab('notes');
  } 

});

/* Reset when back to desktop */
window.addEventListener('resize', () => {
  const sb = document.getElementById('sb');
  const ed = document.getElementById('ed');

  if (!sb || !ed) return;

  if (!isMobile()) {
    sb.classList.remove('hidden-mobile');
    ed.classList.remove('visible-mobile');
  } else {
    switchMobileTab('notes');
  }
});
